<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>表面被覆率シミュレーター - パーティクル版</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; }
        h2 { color: #00e5ff; border-bottom: 1px solid #333; padding-bottom: 10px; font-weight: 300; letter-spacing: 1px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .dashboard { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .panel { background: #1e1e1e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .graph-panel { flex: 2; min-width: 400px; position: relative; }
        .grid-panel { flex: 1.5; min-width: 400px; display: flex; flex-direction: column; align-items: center; }
        .controls { display: flex; flex-wrap: wrap; gap: 15px; background: #1e1e1e; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .control-group { flex: 1; min-width: 200px; }
        label { display: block; font-size: 0.9em; margin-bottom: 8px; color: #bbb; }
        .value { color: #00e5ff; font-weight: bold; font-size: 1.2em; display: inline-block; min-width: 50px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00e5ff; }
        .btn { background: #00e5ff; color: #000; border: none; padding: 12px 20px; font-size: 1.1em; font-weight: bold; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 15px; transition: background 0.3s; }
        .btn:hover { background: #00b3cc; }
        canvas#surfaceGrid { background-color: #0a0a0a; border: 1px solid #333; border-radius: 4px; margin-top: 10px; width: 100%; max-width: 500px; }
        .legend { display: flex; gap: 15px; margin-top: 10px; font-size: 0.85em; color: #aaa; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .warning { font-size: 0.85em; color: #888; margin-top: 20px; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h2>表面被覆率 $\Theta(t)$ の動的バランスとRIEシナジー</h2>
        
        <div class="controls">
            <div class="control-group">
                <label>ラジカルフラックス Γ_in: <span class="value" id="val-gamma">50</span></label>
                <input type="range" id="gamma" min="0" max="200" value="50">
            </div>
            <div class="control-group">
                <label>実効表面温度 T_s [K]: <span class="value" id="val-temp">300</span></label>
                <input type="range" id="temp" min="200" max="600" value="300" step="10">
            </div>
            <div class="control-group">
                <label>スティッキング係数 s: <span class="value" id="val-s">0.5</span></label>
                <input type="range" id="s" min="0.01" max="1.0" value="0.5" step="0.01">
            </div>
            <div class="control-group">
                <label>イオンフラックス Γ_ion (Bias): <span class="value" style="color:#ff00ff;" id="val-ion">0</span></label>
                <input type="range" id="ion" min="0" max="100" value="0">
            </div>
            <div class="control-group" style="flex: 0.5;">
                <button class="btn" id="resetBtn">リセット / 開始</button>
            </div>
        </div>

        <div class="dashboard">
            <div class="panel graph-panel">
                <canvas id="timeChart"></canvas>
            </div>
            <div class="panel grid-panel">
                <h3 style="margin:0; font-size:1.1em; color:#ddd;">ミクロ表面モデル (2行20列)</h3>
                <canvas id="surfaceGrid" width="400" height="250"></canvas>
                
                <div class="legend">
                    <div class="legend-item"><div class="dot" style="background:#00e5ff; box-shadow: 0 0 5px #00e5ff;"></div>ラジカル(吸着)</div>
                    <div class="legend-item"><div class="dot" style="background:#ff00ff; box-shadow: 0 0 5px #ff00ff;"></div>イオン(スパッタ)</div>
                    <div class="legend-item"><div class="dot" style="background:#ff8800;"></div>脱離種</div>
                </div>
                
                <p style="margin-top:15px; font-size: 1.2em;">現在の被覆率: <span id="current-theta" class="value" style="font-size: 1.5em;">0.000</span></p>
            </div>
        </div>

        <p class="warning">
            ※ dΘ/dt = s·Γ_in·(1 - Θ) - k_des·Θ - Y_des·Γ_ion·Θ を解き、その結果に基づいてパーティクルアニメーションを同期させています。<br>
            ※ 定性的な理解を目的としたシミュレーターであり、各パラメータは調整された任意単位(a.u.)です。
        </p>
    </div>

    <script>
        // --- 物理モデルのパラメータ ---
        const nu = 1e13, Ea = 0.8, kB = 8.617e-5, Y_des = 0.5;
        let t = 0, theta = 0;
        let timeData = [], thetaData = [];
        let animationId;
        const dt = 0.02; // グラフの進むスピードをゆっくりにする
        const windowTime = 5; // 最初は横軸を5秒に固定

        // --- UI要素の取得 ---
        const uiGamma = document.getElementById('gamma');
        const uiTemp = document.getElementById('temp');
        const uiS = document.getElementById('s');
        const uiIon = document.getElementById('ion');
        const vGamma = document.getElementById('val-gamma');
        const vTemp = document.getElementById('val-temp');
        const vS = document.getElementById('val-s');
        const vIon = document.getElementById('val-ion');
        const vTheta = document.getElementById('current-theta');

        [uiGamma, uiTemp, uiS, uiIon].forEach(el => {
            el.addEventListener('input', () => {
                vGamma.innerText = uiGamma.value;
                vTemp.innerText = uiTemp.value;
                vS.innerText = uiS.value;
                vIon.innerText = uiIon.value;
            });
        });

        // --- Chart.js (グラフ) の初期化 ---
        const ctxChart = document.getElementById('timeChart').getContext('2d');
        Chart.defaults.color = '#888888';
        const chart = new Chart(ctxChart, {
            type: 'line',
            data: { labels: timeData, datasets: [{
                label: '被覆率 Θ(t)', data: thetaData,
                borderColor: '#00e5ff', backgroundColor: 'rgba(0, 229, 255, 0.1)',
                borderWidth: 2, fill: true, pointRadius: 0, tension: 0.2
            }]},
            options: {
                responsive: true, maintainAspectRatio: false,
                animation: false,
                scales: {
                    x: { title: { display: true, text: 'Time [s]' }, min: 0, max: windowTime },
                    y: { title: { display: true, text: 'Coverage Θ' }, min: 0, max: 1.0 }
                },
                plugins: { legend: { labels: { color: '#ddd' } } }
            }
        });

        // --- 表面サイト・パーティクルの初期化 ---
        const canvas = document.getElementById('surfaceGrid');
        const ctx = canvas.getContext('2d');
        const cols = 20;
        const rows = 2;
        const totalSites = cols * rows;
        let siteStates = Array(totalSites).fill(0); // 0:空き, 1:吸着
        let particles = [];

        // サイトの描画位置 (Canvas下部)
        const cellW = canvas.width / cols;
        const cellH = 20;
        const startY = canvas.height - (rows * cellH) - 10;

        class Particle {
            constructor(x, y, vx, vy, type) {
                this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.type = type;
                this.life = 1.0;
            }
        }

        // 火花エフェクト（イオン衝突時）
        function createSparks(x, y) {
            for(let i=0; i<5; i++) {
                particles.push(new Particle(x, y, (Math.random()-0.5)*4, (Math.random()-0.5)*4, 'spark'));
            }
        }

        // --- アニメーションループ ---
        function loop() {
            const gamma = parseFloat(uiGamma.value);
            const temp = parseFloat(uiTemp.value);
            const s = parseFloat(uiS.value);
            const ion = parseFloat(uiIon.value);

            // 脱離定数の計算 (アレニウス)
            const k_des_raw = nu * Math.exp(-Ea / (kB * temp));
            const k_des = k_des_raw * 1e-11;

            // 微分方程式 (dtのスケールに合わせる)
            const dTheta = (s * gamma * 0.02 * (1 - theta) - k_des * theta - Y_des * ion * 0.02 * theta) * dt;
            theta += dTheta;
            if (theta < 0) theta = 0;
            if (theta > 1) theta = 1;
            t += dt;

            // グラフの更新
            timeData.push(t.toFixed(2));
            thetaData.push(theta);
            
            if (t > windowTime) {
                chart.options.scales.x.min = t - windowTime;
                chart.options.scales.x.max = t;
                timeData.shift();
                thetaData.shift();
            }
            chart.update();
            vTheta.innerText = theta.toFixed(3);

            // --- パーティクルとサイトの物理同期 ---
            // 理論値に基づく目標吸着数
            let targetAdsorbed = Math.floor(theta * totalSites);
            let currentAdsorbed = siteStates.reduce((a,b)=>a+b, 0);

            // 1. ラジカルを上から降らす
            if (Math.random() < gamma * 0.015) {
                particles.push(new Particle(Math.random() * canvas.width, 0, (Math.random()-0.5)*0.5, 2 + Math.random()*2, 'radical'));
            }

            // 2. イオンを上から降らす (バイアス)
            if (Math.random() < ion * 0.015) {
                particles.push(new Particle(Math.random() * canvas.width, 0, 0, 6 + Math.random()*3, 'ion'));
            }

            // 3. 熱脱離のランダム発生 (理論値より実際のサイトが多ければ確率でポワッと抜ける)
            if (currentAdsorbed > targetAdsorbed && Math.random() < 0.3) {
                let filled = [];
                siteStates.forEach((val, idx) => { if(val === 1) filled.push(idx); });
                if(filled.length > 0) {
                    let rIdx = filled[Math.floor(Math.random() * filled.length)];
                    siteStates[rIdx] = 0;
                    currentAdsorbed--;
                    let px = (rIdx % cols) * cellW + cellW/2;
                    let py = startY + Math.floor(rIdx / cols) * cellH + cellH/2;
                    particles.push(new Particle(px, py, (Math.random()-0.5)*1, -1 - Math.random(), 'thermal_desorbed'));
                }
            }

            // 描画のクリア (残像効果)
            ctx.fillStyle = 'rgba(10, 10, 10, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // パーティクルの移動と衝突判定
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;

                if (p.type === 'radical' && p.y >= startY) {
                    // サイトに衝突して吸着を試みる
                    if (currentAdsorbed < targetAdsorbed) {
                        let empty = [];
                        siteStates.forEach((val, idx) => { if(val === 0) empty.push(idx); });
                        if(empty.length > 0) {
                            let rIdx = empty[Math.floor(Math.random() * empty.length)];
                            siteStates[rIdx] = 1;
                            currentAdsorbed++;
                        }
                    }
                    particles.splice(i, 1);
                }
                else if (p.type === 'ion' && p.y >= startY) {
                    // イオン衝突エフェクト
                    createSparks(p.x, startY);
                    if (currentAdsorbed > targetAdsorbed) {
                        // サイトの吸着種を物理スパッタリングで剥がす
                        let filled = [];
                        siteStates.forEach((val, idx) => { if(val === 1) filled.push(idx); });
                        if(filled.length > 0) {
                            let rIdx = filled[Math.floor(Math.random() * filled.length)];
                            siteStates[rIdx] = 0;
                            currentAdsorbed--;
                            particles.push(new Particle(p.x, startY, (Math.random()-0.5)*3, -3 - Math.random()*3, 'sputtered'));
                        }
                    }
                    particles.splice(i, 1);
                }
                else if (p.type === 'spark') {
                    p.life -= 0.1;
                    if(p.life <= 0) particles.splice(i, 1);
                }
                else if ((p.type === 'thermal_desorbed' || p.type === 'sputtered') && p.y < -10) {
                    particles.splice(i, 1);
                }

                // パーティクル描画
                ctx.beginPath();
                if (p.type === 'radical') {
                    ctx.fillStyle = '#00e5ff';
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                } else if (p.type === 'ion') {
                    ctx.fillStyle = '#ff00ff';
                    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                    // 軌跡
                    ctx.fillRect(p.x-1, p.y-10, 2, 10);
                } else if (p.type === 'thermal_desorbed') {
                    ctx.fillStyle = '#ffaa00';
                    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                } else if (p.type === 'sputtered') {
                    ctx.fillStyle = '#ff4400';
                    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
                } else if (p.type === 'spark') {
                    ctx.fillStyle = `rgba(255, 100, 255, ${p.life})`;
                    ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
                }
                ctx.fill();
            }

            // サイトの描画
            for (let i = 0; i < totalSites; i++) {
                let x = (i % cols) * cellW;
                let y = startY + Math.floor(i / cols) * cellH;
                
                // 枠線
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, cellW, cellH);

                // 中身（吸着）
                if (siteStates[i] === 1) {
                    ctx.fillStyle = '#00e5ff';
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#00e5ff';
                    ctx.fillRect(x + 2, y + 2, cellW - 4, cellH - 4);
                    ctx.shadowBlur = 0; // 他に影響しないように戻す
                }
            }

            animationId = requestAnimationFrame(loop);
        }

        // --- リセット処理 ---
        document.getElementById('resetBtn').addEventListener('click', () => {
            cancelAnimationFrame(animationId);
            t = 0; theta = 0;
            timeData.length = 0; thetaData.length = 0;
            siteStates.fill(0);
            particles = [];
            chart.options.scales.x.min = 0; 
            chart.options.scales.x.max = windowTime;
            loop();
        });

        // 起動
        loop();
    </script>
</body>
</html>
